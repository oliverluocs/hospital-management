<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Room</title>
  <link rel="stylesheet" href="/Style/styles.css" />
  <script defer src="/Script/script.js"></script>
</head>

<body class="">
  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">
        <div class="brand-mark">H</div>
        <div class="brand-copy">
          Hospital Management
        </div>
      </a>
      <nav class="main-nav">
        <a class="nav-link" href="admin_dashboard.html">Dashboard</a>
        <a class="nav-link" href="patient_lookup.html">Patients</a>
        <a class="nav-link" href="staff_management.html">Staff</a>
        <a class="nav-link active" href="room_management.html">Rooms</a>
        <a class="nav-link" href="departments_management.html">Departments</a>
        <a class="nav-link" href="reports.html">Reports</a>
      </nav>
      <div class="user-chip">
        <div class="avatar">A</div>
        <div>Admin</div>
        <a class="nav-link" href="index.html">Log out</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <!-- <span class="badge">Admin only</span> -->
      <h1>Add or Update Room</h1>
    </section>

    <section class="form-card">
      <form id="roomForm" class="stack">
        <div class="form-grid">
          <div>
            <label class="required" for="roomNum">Room Number</label>
            <input id="roomNum" type="text" placeholder="205" required />
          </div>
          <div>
            <label class="required" for="roomDept">Department ID</label>
            <select id="roomDept" required>
  		<option value="">Select department</option>
 		<option value="DEP01">Cardiology</option>
 		<option value="DEP02">Emergency</option>
  		<option value="DEP03">ICU</option>
  		<option value="DEP04">Oncology</option>
  		<option value="DEP05">Pediatrics</option>
            </select>
          </div>
          <div>
            <label class="required" for="roomType">Room Type</label>
            <select id="roomType" required>
              <option value="">Select type</option>
              <option>Standard</option>
              <option>ICU</option>
              <option>Isolation</option>
              <option>VIP</option>
            </select>
          </div>
          <div>
            <label class="required" for="bedsCount">Bed Count</label>
            <input id="bedsCount" type="number" min="1" placeholder="4" required />
          </div>
	<div>
  		<label for="occupied">Occupied Beds</label>
  		<input id="occupied" type="number" min="0" placeholder="0" value="0" />
	</div>
          <div>
            <label for="lastCleaned">Last Cleaned</label>
            <input id="lastCleaned" type="datetime-local" />
          </div>
        </div>
        <div class="form-actions">
          <a class="btn btn-secondary" href="room_management.html">Cancel</a>
          <button class="btn btn-primary" type="submit">Submit</button>
        </div>
      </form>
    </section>
  </main>

</body>

</html>
