<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="/Style/styles.css" />
  <script defer src="/Script/script.js"></script>
</head>

<body class="">
  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">
        <div class="brand-mark">H</div>
        <div class="brand-copy">
          Hospital Management
        </div>
      </a>
      <nav class="main-nav">
        <a class="nav-link" href="admin_dashboard.html">Dashboard</a>
        <a class="nav-link" href="patient_lookup.html">Patients</a>
        <a class="nav-link" href="staff_management.html">Staff</a>
        <a class="nav-link" href="room_management.html">Rooms</a>
        <a class="nav-link active" href="departments_management.html">Departments</a>
        <a class="nav-link" href="reports.html">Reports</a>
      </nav>
      <div class="user-chip">
        <div class="avatar">A</div>
        <div>Admin</div>
        <a class="nav-link" href="index.html">Log out</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <!-- <span class="badge">Admin edit • Doctor and Nurse view</span> -->
      <h1>Department Management</h1>
      <!-- <p>Department list with search inputs and a separate form page to add or edit departments.</p> -->
    </section>

    <section class="table-card">
      <div class="table-header">
        <div>
          <h2 class="section-title">Search departments</h2>
        </div>
        <a class="btn btn-primary" href="add_department.html">Add Department</a>
      </div>
      <div class="search-grid">
        <div>
          <label for="deptIdSearch">Department ID</label>
          <input id="deptIdSearch" type="text" placeholder="DEP01" />
        </div>
        <div>
          <label for="deptNameSearch">Department Name</label>
          <input id="deptNameSearch" type="text" placeholder="Cardiology" />
        </div>
        <div>
          <label for="deptLocationSearch">Location</label>
          <input id="deptLocationSearch" type="text" placeholder="Floor 2 West Wing" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn btn-primary" type="button">Search</button>
        </div>
      </div>
    </section>

    <section class="table-card" style="margin-top: 20px;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Department ID</th>
              <th>Department</th>
              <th>Location</th>
              <th>Beds Total</th>
              <th>Patient Count</th>
              <th>Open</th>
            </tr>
          </thead>
          <tbody id="deptTable"></tbody>
        </table>
      </div>
    </section>
  </main>

</body>

</html>
