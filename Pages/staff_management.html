<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Management</title>
  <link rel="stylesheet" href="../Style/styles.css" />
  <script defer src="../Script/script.js"></script>
</head>

<body class="">
  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">
        <div class="brand-mark">H</div>
        <div class="brand-copy">
          Hospital Management
        </div>
      </a>
      <nav class="main-nav">
        <a class="nav-link" href="admin_dashboard.html">Dashboard</a>
        <a class="nav-link" href="patient_lookup.html">Patients</a>
        <a class="nav-link active" href="staff_management.html">Staff</a>
        <a class="nav-link" href="room_management.html">Rooms</a>
        <a class="nav-link" href="departments_management.html">Departments</a>
        <a class="nav-link" href="reports.html">Reports</a>
      </nav>
      <div class="user-chip">
        <div class="avatar">A</div>
        <div>Admin</div>
        <a class="nav-link" href="index.html">Log out</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <!-- <span class="badge">Admin can edit • Doctor and Nurse view</span> -->
      <h1>Staff Management</h1>
      <!-- <p>Doctor and nurse lists share the same layout, with role-specific add forms linked from this page.</p> -->
    </section>

    <section class="table-card">
      <div class="space-between" style="margin-bottom: 18px;">
        <div class="tab-bar" data-tab-group="staffTabs">
          <button class="tab-btn active" type="button" data-tab="doctors">Doctors</button>
          <button class="tab-btn" type="button" data-tab="nurses">Nurses</button>
        </div>
        <div class="row">
          <a class="btn btn-outline" href="add_doctor.html">Add Doctor</a>
          <a class="btn btn-primary" href="add_nurse.html">Add Nurse</a>
        </div>
      </div>

      <div class="search-grid" style="margin-bottom: 14px;">
        <div>
          <label for="staffFirst">First Name</label>
          <input id="staffFirst" type="text" placeholder="Hailey" />
        </div>
        <div>
          <label for="staffLast">Last Name</label>
          <input id="staffLast" type="text" placeholder="Example" />
        </div>
        <div>
          <label for="staffDept">Department</label>
          <select id="staffDept">
            <option value="">All departments</option>
            <option>Cardiology</option>
            <option>Emergency</option>
            <option>ICU</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn btn-primary" type="button">Search</button>
        </div>
      </div>

      <div class="tab-panel active" data-panel="doctors" data-panel-group="staffTabs">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Doctor ID</th>
                <th>Department</th>
                <th>Shift Start</th>
                <th>Shift End</th>
                <th>On Shift</th>
                <th>Open</th>
              </tr>
            </thead>
            <tbody id="doctorTable"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel" data-panel="nurses" data-panel-group="staffTabs">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Nurse ID</th>
                <th>Department</th>
                <th>Shift Start</th>
                <th>Shift End</th>
                <th>On Shift</th>
                <th>Open</th>
              </tr>
            </thead>
            <tbody id="nurseTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

</body>

</html>
