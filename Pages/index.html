<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Management Login</title>
  <link rel="stylesheet" href="/Style/styles.css" />
  <script defer src="/Script/script.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">
        <div class="brand-mark">H</div>
        <div class="brand-copy">
          Hospital Management
          <small>Login and role selection</small>
        </div>
      </a>
      <div class="user-chip">
        <div class="avatar">?</div>
        <div>Guest</div>
      </div>
    </div>
  </header>

  <main class="page login-shell">
    <section class="login-card">
      <h1>Login</h1>
      <form class="stack" data-demo-form="admin_dashboard.html">
        <div>
          <label class="required" for="userId">User ID</label>
          <input id="userId" name="userId" type="text" placeholder="Enter user ID" required />
        </div>
        <div>
          <label class="required" for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required />
        </div>
        <div>
          <label class="required" for="role">Demo Role</label>
          <select id="role" name="role" required>
            <option value="Admin">Admin</option>
            <option value="Doctor">Doctor</option>
            <option value="Nurse">Nurse</option>
          </select>
        </div>
        <!-- <div class="info-banner small"> </div> -->
        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Login</button>
        </div>
      </form>
    </section>
  </main>
</body>

</html>
