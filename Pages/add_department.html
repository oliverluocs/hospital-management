<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="../Style/styles.css" />
  <script defer src="../Script/script.js"></script>
</head>

<body class="">
  <header class="site-header">
    <div class="container topbar">
      <a href="index.html" class="brand">
        <div class="brand-mark">H</div>
        <div class="brand-copy">
          Hospital Management
        </div>
      </a>
      <nav class="main-nav">
        <a class="nav-link" href="admin_dashboard.html">Dashboard</a>
        <a class="nav-link" href="patient_lookup.html">Patients</a>
        <a class="nav-link" href="staff_management.html">Staff</a>

        <a class="nav-link active" href="departments_management.html">Departments</a>
        <a class="nav-link" href="reports.html">Reports</a>
      </nav>
      <div class="user-chip">
        <div class="avatar">A</div>
        <div>Admin</div>
        <a class="nav-link" href="index.html">Log out</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <!-- <span class="badge">Admin only</span> -->
      <h1>Add or Update Department</h1>
      <!-- <p>Static department form aligned to the latest schema fields.</p> -->
    </section>

    <section class="form-card">
      <form id="deptForm" class="stack">
        <div class="form-grid">
          <div>
            <label class="required" for="deptId">Department ID</label>
            <input id="deptId" type="text" placeholder="DEP04" required />
          </div>
          <div>
            <label class="required" for="deptName">Department Name</label>
            <input id="deptName" type="text" placeholder="Oncology" required />
          </div>
          <div>
            <label class="required" for="deptLocation">Department Location</label>
            <input id="deptLocation" type="text" placeholder="Floor 4 South Wing" required />
          </div>
          <div>
            <label class="required" for="bedsTotal">Beds Total</label>
            <input id="bedsTotal" type="number" min="0" placeholder="18" required />
          </div>
        </div>
        <div class="form-actions">
          <a class="btn btn-secondary" href="departments_management.html">Cancel</a>
          <button class="btn btn-primary" type="submit">Submit</button>
        </div>
      </form>
    </section>
  </main>

</body>

</html>
